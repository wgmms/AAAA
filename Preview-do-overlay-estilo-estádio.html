<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overlay - Escolha o Próximo Jogo</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@600;700;900&display=swap');
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
  }

  .overlay-container {
    position: relative;
    width: 100%;
    max-width: 1200px;
    margin: 40px auto;
    padding: 4px;
  }

  .stadium-lights {
    position: absolute;
    inset: -100px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .light {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(0,247,255,0.1) 40%, transparent 70%);
    filter: blur(40px);
    animation: lightSweep 8s ease-in-out infinite;
  }

  .light:nth-child(1) { top: -100px; left: 10%; animation-delay: 0s; }
  .light:nth-child(2) { top: -100px; right: 10%; animation-delay: 2s; }
  .light:nth-child(3) { bottom: -100px; left: 25%; animation-delay: 4s; }
  .light:nth-child(4) { bottom: -100px; right: 25%; animation-delay: 6s; }

  @keyframes lightSweep {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.2); }
  }

  .neon-frame {
    position: relative;
    padding: 40px 50px 40px 160px;
    background: rgba(0, 8, 15, 0.82);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    overflow: visible;
    z-index: 1;
  }

  .grass-overlay {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0.15;
    pointer-events: none;
    z-index: 1;
    background: 
      repeating-linear-gradient(
        90deg,
        transparent 0px,
        rgba(0,255,136,0.03) 2px,
        transparent 4px
      ),
      repeating-linear-gradient(
        0deg,
        transparent 0px,
        rgba(0,247,255,0.02) 50px,
        transparent 52px
      ),
      linear-gradient(135deg, rgba(0,40,20,0.4) 0%, rgba(0,20,40,0.4) 100%);
  }

  .field-lines {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    pointer-events: none;
    opacity: 0.12;
    z-index: 1;
  }

  .field-lines::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100px;
    height: 100px;
    border: 2px solid rgba(0,255,136,1);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px rgba(0,255,136,0.5);
  }

  .field-lines::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,247,255,0.8), transparent);
    transform: translateY(-50%);
  }

  /* Neon border with crowd cheer pulse */
  .neon-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 4px;
    background: linear-gradient(90deg, 
      #00f7ff 0%, 
      #00ff88 25%, 
      #ccff00 50%,
      #00ff88 75%, 
      #00f7ff 100%);
    background-size: 200% 100%;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: borderMove 3s linear infinite, borderFlicker 2.5s ease-in-out infinite, crowdPulse 0.8s ease-in-out infinite;
    box-shadow: 
      0 0 20px #00f7ff,
      0 0 40px #00ff88,
      inset 0 0 20px rgba(0, 247, 255, 0.5);
    z-index: 2;
  }

  @keyframes crowdPulse {
    0%, 100% { 
      box-shadow: 
        0 0 20px #00f7ff,
        0 0 40px #00ff88,
        inset 0 0 20px rgba(0, 247, 255, 0.5);
    }
    50% { 
      box-shadow: 
        0 0 30px #00f7ff,
        0 0 60px #00ff88,
        0 0 80px #ccff00,
        inset 0 0 30px rgba(0, 247, 255, 0.8);
    }
  }

  /* Top bar */
  .top-bar {
    position: absolute;
    top: -20px;
    left: 20px;
    right: 20px;
    height: 40px;
    background: rgba(0, 5, 10, 0.9);
    border: 2px solid #00f7ff;
    border-radius: 20px;
    box-shadow: 
      0 0 15px #00f7ff,
      inset 0 0 15px rgba(0, 247, 255, 0.4);
    overflow: visible;
    z-index: 10;
  }

  .soccer-track {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .soccer-ball {
    position: absolute;
    top: 50%;
    left: 0;
    width: 36px;
    height: 36px;
    transform: translateY(-50%);
    animation: ballKick 5s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
    filter: drop-shadow(0 0 12px #00ff88) drop-shadow(0 0 20px #00f7ff);
    z-index: 11;
  }

  .soccer-ball svg {
    width: 100%;
    height: 100%;
    animation: ballSpin 1s linear infinite;
  }

  @keyframes ballKick {
    0% { 
      left: 5px; 
      transform: translateY(-50%) scale(1);
    }
    5% {
      transform: translateY(-60%) scale(1.1);
    }
    15% { 
      left: 30%;
      transform: translateY(-50%) scale(1);
    }
    45% { 
      left: calc(100% - 41px);
      transform: translateY(-50%) scale(0.95);
    }
    50% {
      transform: translateY(-60%) scale(1.1);
    }
    55% { 
      left: calc(100% - 41px);
      transform: translateY(-50%) scale(1);
    }
    65% {
      left: 60%;
      transform: translateY(-50%) scale(1);
    }
    95% { 
      left: 5px;
      transform: translateY(-50%) scale(0.95);
    }
    100% { 
      left: 5px;
      transform: translateY(-60%) scale(1.1);
    }
  }

  @keyframes ballSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(720deg); }
  }

  /* Spark trail particles */
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #ccff00;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 8px #ccff00, 0 0 12px #00ff88;
    animation: sparkle 0.8s ease-out forwards;
  }

  @keyframes sparkle {
    0% {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    100% {
      opacity: 0;
      transform: scale(0) translateY(-30px);
    }
  }

  /* Confetti particles */
  .confetti {
    position: absolute;
    width: 6px;
    height: 10px;
    pointer-events: none;
    animation: confettiFall 2s ease-out forwards;
  }

  @keyframes confettiFall {
    0% {
      opacity: 1;
      transform: translateY(0) rotate(0deg);
    }
    100% {
      opacity: 0;
      transform: translateY(100px) rotate(360deg);
    }
  }

  .content {
    position: relative;
    z-index: 5;
    text-align: center;
  }

  .main-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(32px, 5vw, 68px);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .main-text .white-text {
    color: #ffffff;
    text-shadow: 
      0 0 10px #00f7ff,
      0 0 20px #00f7ff,
      0 0 30px #00f7ff,
      0 0 40px #00f7ff;
    animation: announcerPulse 2s ease-in-out infinite;
    display: inline-block;
  }

  .main-text .green-text {
    color: #ccff00;
    text-shadow: 
      0 0 15px #ccff00,
      0 0 30px #ccff00,
      0 0 50px #ccff00,
      0 0 70px #00ff88,
      0 0 100px #00ff88;
    animation: announcerPulseGreen 1.6s ease-in-out infinite;
    display: inline-block;
    transform-origin: center;
  }

  .sub-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(18px, 2.5vw, 34px);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ffffff;
  }

  .sub-text .cyan-text {
    color: #00e5ff;
    text-shadow: 
      0 0 10px #00e5ff,
      0 0 25px #00e5ff,
      0 0 40px #00e5ff,
      0 0 60px #00e5ff;
    animation: announcerPulseCyan 2s ease-in-out infinite;
  }

  /* Chat icon */
  .chat-icon {
    position: absolute;
    left: 35px;
    top: 50%;
    transform: translateY(-50%);
    width: 95px;
    height: 95px;
    z-index: 6;
    filter: drop-shadow(0 0 15px #00f7ff) drop-shadow(0 0 25px #00ff88);
    animation: iconBounce 2s ease-in-out infinite;
  }

  /* Corner energy effects */
  .energy-corner {
    position: absolute;
    width: 60px;
    height: 60px;
    pointer-events: none;
    z-index: 3;
  }

  .energy-corner::before,
  .energy-corner::after {
    content: '';
    position: absolute;
    background: linear-gradient(45deg, #00f7ff, #ccff00, #00ff88);
    box-shadow: 0 0 15px #00f7ff;
  }

  .energy-corner.tl {
    top: -4px;
    left: -4px;
  }

  .energy-corner.tl::before {
    width: 40px;
    height: 4px;
    top: 0;
    left: 0;
    animation: energyFlicker 1.5s ease-in-out infinite;
  }

  .energy-corner.tl::after {
    width: 4px;
    height: 40px;
    top: 0;
    left: 0;
    animation: energyFlicker 1.8s ease-in-out infinite 0.2s;
  }

  .energy-corner.tr {
    top: -4px;
    right: -4px;
    transform: scaleX(-1);
  }

  .energy-corner.tr::before {
    width: 40px;
    height: 4px;
    top: 0;
    left: 0;
    animation: energyFlicker 1.6s ease-in-out infinite 0.3s;
  }

  .energy-corner.tr::after {
    width: 4px;
    height: 40px;
    top: 0;
    left: 0;
    animation: energyFlicker 1.7s ease-in-out infinite 0.1s;
  }

  .energy-corner.bl {
    bottom: -4px;
    left: -4px;
    transform: scaleY(-1);
  }

  .energy-corner.bl::before {
    width: 40px;
    height: 4px;
    top: 0;
    left: 0;
    animation: energyFlicker 1.4s ease-in-out infinite 0.4s;
  }

  .energy-corner.bl::after {
    width: 4px;
    height: 40px;
    top: 0;
    left: 0;
    animation: energyFlicker 1.9s ease-in-out infinite 0.2s;
  }

  .energy-corner.br {
    bottom: -4px;
    right: -4px;
    transform: scale(-1);
  }

  .energy-corner.br::before {
    width: 40px;
    height: 4px;
    top: 0;
    left: 0;
    animation: energyFlicker 1.5s ease-in-out infinite 0.5s;
  }

  .energy-corner.br::after {
    width: 4px;
    height: 40px;
    top: 0;
    left: 0;
    animation: energyFlicker 1.6s ease-in-out infinite 0.3s;
  }

  /* Animations */
  @keyframes borderMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  @keyframes borderFlicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
    52% { opacity: 1; }
    54% { opacity: 0.9; }
  }

  @keyframes announcerPulse {
    0%, 100% {
      text-shadow: 
        0 0 10px #00f7ff,
        0 0 20px #00f7ff,
        0 0 30px #00f7ff,
        0 0 40px #00f7ff;
      transform: scale(1);
    }
    50% {
      text-shadow: 
        0 0 20px #00f7ff,
        0 0 40px #00f7ff,
        0 0 60px #00f7ff,
        0 0 80px #00f7ff,
        0 0 120px #00f7ff;
      transform: scale(1.03);
    }
  }

  @keyframes announcerPulseGreen {
    0%, 100% {
      text-shadow: 
        0 0 15px #ccff00,
        0 0 30px #ccff00,
        0 0 50px #ccff00,
        0 0 70px #00ff88;
      transform: scale(1) rotate(0deg);
    }
    25% {
      text-shadow: 
        0 0 20px #ccff00,
        0 0 40px #ccff00,
        0 0 70px #ccff00,
        0 0 90px #00ff88,
        0 0 120px #00ff88;
      transform: scale(1.05) rotate(-1deg);
    }
    50% {
      text-shadow: 
        0 0 25px #ccff00,
        0 0 50px #ccff00,
        0 0 80px #ccff00,
        0 0 110px #00ff88,
        0 0 150px #00ff88;
      transform: scale(1.08) rotate(1deg);
    }
    75% {
      text-shadow: 
        0 0 20px #ccff00,
        0 0 40px #ccff00,
        0 0 70px #ccff00,
        0 0 90px #00ff88;
      transform: scale(1.05) rotate(-1deg);
    }
  }

  @keyframes announcerPulseCyan {
    0%, 100% {
      text-shadow: 
        0 0 10px #00e5ff,
        0 0 25px #00e5ff,
        0 0 40px #00e5ff;
    }
    50% {
      text-shadow: 
        0 0 20px #00e5ff,
        0 0 40px #00e5ff,
        0 0 60px #00e5ff,
        0 0 90px #00e5ff,
        0 0 120px #00e5ff;
    }
  }

  @keyframes iconBounce {
    0%, 100% { transform: translateY(-50%) rotate(-8deg) scale(1); }
    25% { transform: translateY(-55%) rotate(0deg) scale(1.05); }
    50% { transform: translateY(-50%) rotate(8deg) scale(1); }
    75% { transform: translateY(-55%) rotate(0deg) scale(1.05); }
  }

  @keyframes energyFlicker {
    0%, 100% { opacity: 1; box-shadow: 0 0 15px #00f7ff, 0 0 25px #00ff88; }
    50% { opacity: 0.6; box-shadow: 0 0 8px #00f7ff, 0 0 15px #00ff88; }
    52% { opacity: 1; }
    54% { opacity: 0.8; }
  }

  /* Mobile responsive */
  @media (max-width: 768px) {
    .neon-frame {
      padding: 30px 30px 30px 105px;
    }
    
    .chat-icon {
      width: 65px;
      height: 65px;
      left: 20px;
    }

    .main-text {
      font-size: 28px;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .sub-text {
      font-size: 16px;
    }

    .top-bar {
      height: 32px;
      top: -16px;
    }

    .soccer-ball {
      width: 28px;
      height: 28px;
    }

    .light {
      width: 200px;
      height: 200px;
    }
  }

  @media (max-width: 390px) {
    .neon-frame {
      padding: 22px 20px 22px 80px;
    }
    
    .chat-icon {
      width: 52px;
      height: 52px;
      left: 14px;
    }

    .main-text {
      font-size: 22px;
      letter-spacing: 1.5px;
    }

    .sub-text {
      font-size: 14px;
      letter-spacing: 1px;
    }

    .stadium-lights {
      opacity: 0.3;
    }
  }
</style>
</head>
<body>
  <div class="overlay-container">
    <!-- Stadium lights background -->
    <div class="stadium-lights">
      <div class="light"></div>
      <div class="light"></div>
      <div class="light"></div>
      <div class="light"></div>
    </div>

    <div class="neon-frame">
      <!-- Grass texture -->
      <div class="grass-overlay"></div>
      <div class="field-lines"></div>

      <!-- Energy corners -->
      <div class="energy-corner tl"></div>
      <div class="energy-corner tr"></div>
      <div class="energy-corner bl"></div>
      <div class="energy-corner br"></div>

      <!-- Top bar with kicking soccer ball -->
      <div class="top-bar">
        <div class="soccer-track" id="track">
          <div class="soccer-ball" id="ball">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="ballShine" cx="35%" cy="35%">
                  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
                  <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
                </radialGradient>
              </defs>
              <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#000000" stroke-width="2"/>
              <circle cx="50" cy="50" r="48" fill="url(#ballShine)"/>
              <path d="M50 2 L65 25 L50 35 L35 25 Z" fill="#000000"/>
              <path d="M50 98 L35 75 L50 65 L65 75 Z" fill="#000000"/>
              <path d="M2 50 L25 35 L35 50 L25 65 Z" fill="#000000"/>
              <path d="M98 50 L75 65 L65 50 L75 35 Z" fill="#000000"/>
              <path d="M15 15 L30 28 L25 35 L15 25 Z" fill="#000000"/>
              <path d="M85 15 L85 25 L75 35 L70 28 Z" fill="#000000"/>
              <path d="M15 85 L15 75 L25 65 L30 72 Z" fill="#000000"/>
              <path d="M85 85 L70 72 L75 65 L85 75 Z" fill="#000000"/>
              <polygon points="50,35 65,25 75,35 65,50 50,65 35,50 25,35 35,25" fill="#000000"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Chat icon -->
      <div class="chat-icon">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="chatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f7ff"/>
              <stop offset="50%" stop-color="#00ff88"/>
              <stop offset="100%" stop-color="#ccff00"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <path d="M50 5 C25 5 5 25 5 50 C5 60 9 69 16 76 L16 95 L35 76 C40 78 45 79 50 79 C75 79 95 59 95 34 C95 17 75 5 50 5 Z" fill="url(#chatGradient)" opacity="0.95" filter="url(#glow)"/>
          <circle cx="30" cy="42" r="6" fill="#000" opacity="0.8"/>
          <circle cx="50" cy="42" r="6" fill="#000" opacity="0.8"/>
          <circle cx="70" cy="42" r="6" fill="#000" opacity="0.8"/>
        </svg>
      </div>

      <!-- Main content -->
      <div class="content">
        <div class="main-text">
          <span class="white-text">ESCOLHA O </span>
          <span class="green-text">PRÓXIMO JOGO!</span>
        </div>
        <div class="sub-text">
          ESCREVA O NOME DA SELEÇÃO <span class="cyan-text">NO CHAT</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Particle system for spark trails and confetti
    const track = document.getElementById('track');
    const ball = document.getElementById('ball');
    const colors = ['#00f7ff', '#00ff88', '#ccff00', '#00e5ff'];
    
    function createParticle(x, y, type = 'spark') {
      const particle = document.createElement('div');
      particle.className = type;
      
      if (type === 'spark') {
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
      } else {
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.transform = `rotate(${Math.random() * 360}deg)`;
      }
      
      track.appendChild(particle);
      setTimeout(() => particle.remove(), type === 'spark' ? 800 : 2000);
    }

    // Track ball position and create trail
    let lastX = 0;
    setInterval(() => {
      const ballRect = ball.getBoundingClientRect();
      const trackRect = track.getBoundingClientRect();
      const x = ballRect.left - trackRect.left + ballRect.width / 2;
      const y = ballRect.top - trackRect.top + ballRect.height / 2;
      
      // Create spark trail
      if (Math.abs(x - lastX) > 5) {
        createParticle(x, y, 'spark');
        
        // Random confetti burst on "kick" moments
        if (Math.random() > 0.7) {
          for (let i = 0; i < 3; i++) {
            setTimeout(() => {
              createParticle(
                x + (Math.random() - 0.5) * 30,
                y + (Math.random() - 0.5) * 20,
                'confetti'
              );
            }, i * 50);
          }
        }
      }
      lastX = x;
    }, 50);

    // Burst confetti on load
    window.addEventListener('load', () => {
      setTimeout(() => {
        for (let i = 0; i < 15; i++) {
          setTimeout(() => {
            const x = Math.random() * track.offsetWidth;
            const y = track.offsetHeight / 2;
            createParticle(x, y, 'confetti');
          }, i * 40);
        }
      }, 500);
    });
  </script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
